<!Doctype html>
<html>
    <head>
        <title>My Website</title>
    </head> 
    <form>
        <label>Email:</label>
        <input type="email", placeholder="Enter your email"><br>
        <label>Password:</label>
        <input type="Password," placeholder="Enter your email"><br>
        <label>Gender: </label>
        <input type="radio", name="gender">Male<br>
        <input type="radio", name="gender">Female<br>
        <label>Hobbies: </label>
        <input type="checkbox", name="gender">Basket Ball<br>
        <input type="checkbox", name="gender">Drawing<br>
        <input type="checkbox", name="gender">Crafting<br>
        <label>Event type: </label>
        <select>
            <option>Festival</option>
            <option>Birthday</option>
            <option>Other</option>
        </select>
        <br>
        <label>Address: </label>
        <textarea rows="4", cols="3">Textarea</textarea><br>
        <button>Submit</button>
    </form>
</html>
